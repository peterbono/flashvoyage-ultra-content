name: Linkbuilding — Voyage Forum Daily Post

on:
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:

env:
  NODE_ENV: production

jobs:
  post-reply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Need token with push permissions to commit state changes back
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install playwright

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Run Voyage Forum daily post
        env:
          VF_PASSWORD: ${{ secrets.VF_PASSWORD }}
          BRIGHTDATA_RESIDENTIAL_AUTH: ${{ secrets.BRIGHTDATA_RESIDENTIAL_AUTH }}
        run: node scripts/linkbuilding/vf-daily-cron.js

      - name: Commit state changes back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/linkbuilding-week-plan.json data/linkbuilding-log.jsonl
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore(linkbuilding): update VF post state [skip ci]"
            git push
          fi
