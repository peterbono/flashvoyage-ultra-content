name: Publier Posts Sociaux (IG + FB + Threads)

# Carousel posts from WP articles — published 2x/week
# Cross-posts to FB Page + Threads + IG Story with article link

on:
  schedule:
    # Tuesday + Saturday at 14h00 Paris (12h00 UTC in summer, 13h00 UTC in winter)
    - cron: '0 12 * * 2,6'

  workflow_dispatch:
    inputs:
      post_id:
        description: 'WordPress article ID (leave empty for auto-select)'
        required: false
        type: string
      test_only:
        description: 'Test only (no publishing)'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_ENV: production

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies (Chrome for Puppeteer)
        run: |
          npx puppeteer browsers install chrome 2>/dev/null || true

      - name: Setup tokens
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: |
          mkdir -p social-distributor/data
          echo '{"facebook":{"token":"'$FB_PAGE_TOKEN'","expiresAt":"never"},"threads":{"token":"'$THREADS_TOKEN'","expiresAt":"2026-05-23T00:00:00Z"}}' > social-distributor/data/tokens.json

      - name: Determine post and mode
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            POST_ID="${{ github.event.inputs.post_id }}"
            PUBLISH="${{ github.event.inputs.test_only == 'true' && 'false' || 'true' }}"
          else
            POST_ID=""
            PUBLISH="true"
          fi
          echo "post_id=${POST_ID}" >> $GITHUB_OUTPUT
          echo "publish=${PUBLISH}" >> $GITHUB_OUTPUT
          echo "Post ID: ${POST_ID:-auto}"
          echo "Publish: ${PUBLISH}"

      - name: Generate and publish carousel post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: |
          POST_ID="${{ steps.config.outputs.post_id }}"
          PUBLISH="${{ steps.config.outputs.publish }}"

          # Build CLI args
          ARGS=""
          if [ -n "$POST_ID" ]; then
            ARGS="$ARGS --post $POST_ID"
          fi

          if [ "$PUBLISH" = "true" ]; then
            ARGS="$ARGS --publish"
          else
            ARGS="$ARGS --test"
          fi

          echo "Running: node social-distributor/index.js --recycle $ARGS"
          node social-distributor/index.js --recycle $ARGS

      - name: Cross-publish to FB + Threads + Story
        if: success() && steps.config.outputs.publish == 'true'
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: |
          echo "Cross-publishing handled by the social distributor pipeline"
          echo "Tokens available: FB_PAGE_TOKEN=${FB_PAGE_TOKEN:+set}, THREADS_TOKEN=${THREADS_TOKEN:+set}"
          # Cross-posting (FB photo + Threads text + IG Story) is triggered
          # internally by the distributor after a successful IG carousel publish.
          # If not yet integrated, uncomment to run standalone:
          # node social-distributor/cross-publisher.js --last-post

      - name: Commit state files
        if: success() && steps.config.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social-distributor/data/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update social state after carousel publish [$(date -u +%Y-%m-%d)]"
          git push || true
