name: Generer les pages SEO

on:
  workflow_dispatch:
    inputs:
      template:
        description: 'Template specifique (vide = tous)'
        required: false
        default: ''
        type: choice
        options: ['', 'vols', 'budget', 'visa', 'esim']
      destination:
        description: 'Destination specifique (vide = toutes)'
        required: false
        default: ''
      limit:
        description: 'Nombre max de pages'
        required: false
        default: '5'
      force:
        description: 'Re-generer les pages existantes'
        required: false
        default: '0'
        type: choice
        options: ['0', '1']

  # CRON DESACTIVE — pages SEO generees manuellement par batch
  # schedule:
  #   - cron: '0 7 * * 3'  # Tous les mercredis a 7h UTC

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generer les pages SEO
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          TRAVELPAYOUTS_API_TOKEN: ${{ secrets.TRAVELPAYOUTS_API_TOKEN }}
          JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          TEMPLATE_INPUT: ${{ github.event.inputs.template }}
          DESTINATION_INPUT: ${{ github.event.inputs.destination }}
          LIMIT_INPUT: ${{ github.event.inputs.limit }}
          FORCE_INPUT: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          TEMPLATE="${TEMPLATE_INPUT:-}"
          DEST="${DESTINATION_INPUT:-}"
          LIMIT="${LIMIT_INPUT:-5}"
          FORCE="${FORCE_INPUT:-0}"

          if [[ -n "$TEMPLATE" && ! "$TEMPLATE" =~ ^(vols|budget|visa|esim)$ ]]; then
            echo "Invalid template input"
            exit 1
          fi
          if [[ -n "$DEST" && ! "$DEST" =~ ^[A-Za-z0-9][A-Za-z0-9 _-]{1,79}$ ]]; then
            echo "Invalid destination input"
            exit 1
          fi
          if [[ ! "$LIMIT" =~ ^[0-9]+$ ]] || (( LIMIT < 1 || LIMIT > 50 )); then
            echo "Invalid limit input"
            exit 1
          fi
          if [[ ! "$FORCE" =~ ^(0|1)$ ]]; then
            echo "Invalid force input"
            exit 1
          fi

          ARGS=(--limit "$LIMIT")
          if [[ -n "$TEMPLATE" ]]; then
            ARGS+=(--template "$TEMPLATE")
          fi
          if [[ -n "$DEST" ]]; then
            ARGS+=(--dest "$DEST")
          fi
          if [[ "$FORCE" == "1" ]]; then
            ARGS+=(--force)
          fi
          node scripts/generate-seo-pages.js "${ARGS[@]}"

      - name: Commit state files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seo-matrix.json data/internal-links.json || true
          git diff --cached --quiet || git commit -m "chore: update seo-matrix after page generation"
          git push || true
