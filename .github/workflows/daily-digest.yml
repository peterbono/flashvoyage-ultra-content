name: Daily Founder Digest Email

on:
  schedule:
    # 1h15 UTC = 8h15 Bangkok (founder reads at 8-9am GMT+7)
    - cron: '15 1 * * *'

  workflow_dispatch:

env:
  NODE_ENV: production

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate and send digest email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: florian.gouloubi@gmail.com
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
          # Exposed to let the digest call GitHub Actions API for workflow run
          # status + Actions usage (section 1 anomalies + section 5 pipeline health).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # GA4 service account is needed for FR-filtered WoW signals in section 2.
          # Graceful degradation if unset — section falls back to "GA4 indisponible".
          GA4_SERVICE_ACCOUNT: ${{ secrets.GA4_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Setup tokens for data collection
          mkdir -p social-distributor/data
          echo '{"facebook":{"token":"'$FB_PAGE_TOKEN'","expiresAt":"never"},"threads":{"token":"'$THREADS_TOKEN'","expiresAt":"2026-05-23T00:00:00Z"}}' > social-distributor/data/tokens.json

          echo "[DIGEST] Generating + sending daily digest..."
          node scripts/daily-digest-generator.js --send

      - name: Upload digest as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest-${{ github.run_number }}
          path: data/daily-digest.html
          retention-days: 7
