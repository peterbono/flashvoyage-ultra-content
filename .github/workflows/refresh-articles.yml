name: Rafraichir les articles

on:
  workflow_dispatch:
    inputs:
      slugs:
        description: 'Liste CSV de slugs (batch, prioritaire sur slug/days)'
        required: false
        default: ''
      slug:
        description: 'Slug d un article specifique a refresh (prioritaire sur days/limit)'
        required: false
        default: ''
      days:
        description: 'Age minimum en jours'
        required: false
        default: '30'
      limit:
        description: 'Nombre max d articles a rafraichir'
        required: false
        default: '10'

  # CRON DESACTIVE — decommenter quand pret
  # schedule:
  #   - cron: '0 6 * * 1'  # Tous les lundis a 6h UTC

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Rafraichir les articles
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          TRAVELPAYOUTS_API_TOKEN: ${{ secrets.TRAVELPAYOUTS_API_TOKEN }}
          FLASHVOYAGE_DRY_RUN: '0'
        run: |
          SLUGS="${{ github.event.inputs.slugs }}"
          SLUG="${{ github.event.inputs.slug }}"
          if [ -n "$SLUGS" ]; then
            echo "📦 Batch refresh ciblé: $SLUGS"
            node scripts/refresh-articles.js --slugs "$SLUGS"
          elif [ -n "$SLUG" ]; then
            echo "🎯 Refresh ciblé: $SLUG"
            node scripts/refresh-articles.js --slug "$SLUG"
          else
            echo "📦 Refresh batch (days/limit)"
            node scripts/refresh-articles.js \
              --days ${{ github.event.inputs.days || '30' }} \
              --limit ${{ github.event.inputs.limit || '10' }}
          fi
