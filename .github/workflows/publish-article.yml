name: Publier un article

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Mode test (pas de publication)'
        required: false
        default: '0'
        type: choice
        options: ['0', '1']

  # CRON DESACTIVE — decommenter quand le generateur est pret pour la prod
  # schedule:
  #   - cron: '0 9 * * *'  # Tous les jours a 9h UTC

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generer et publier un article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TRAVELPAYOUTS_API_TOKEN: ${{ secrets.TRAVELPAYOUTS_API_TOKEN }}
          JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          FLASHVOYAGE_DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: npm run publish:article

      - name: Mettre a jour le dashboard couts
        if: success()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: node scripts/publish-cost-dashboard.js

      - name: Commit state files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ published-articles-cache.json published-reddit-urls.json used-images.json articles-database.json || true
          git diff --cached --quiet || git commit -m "chore: update state after article publication"
          git push || true
