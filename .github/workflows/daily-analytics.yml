name: Daily Analytics & Trends

on:
  schedule:
    # 6h00 Paris = 4h00 UTC — runs BEFORE the first reel at 7h00 Paris (5h00 UTC)
    - cron: '0 4 * * *'

  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to analyze'
        required: false
        default: '7'
        type: string

env:
  NODE_ENV: production

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan Google Trends
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "[ANALYTICS] Scanning Google Trends for destination priorities..."
          node social-distributor/sources/trends-scanner.js --update 2>&1 || {
            echo "[ANALYTICS] WARN: Trends scanner failed (non-fatal, using stale data)"
          }

      - name: Fetch IG stats (last 48h reels)
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: |
          echo "[ANALYTICS] Fetching Instagram reel performance (last 48h)..."
          node social-distributor/analytics/ig-stats-fetcher.js --days 2 2>&1 || {
            echo "[ANALYTICS] WARN: IG stats fetch failed (non-fatal)"
          }

      - name: Fetch GA4 stats (last 7 days)
        env:
          GA4_SERVICE_ACCOUNT: ${{ secrets.GA4_SERVICE_ACCOUNT }}
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          echo "[ANALYTICS] Fetching GA4 website analytics (last ${DAYS} days)..."
          node social-distributor/analytics/ga4-fetcher.js --days "$DAYS" 2>&1 || {
            echo "[ANALYTICS] WARN: GA4 fetch failed (non-fatal)"
          }

      - name: Generate performance report + update scheduler weights
        run: |
          echo "[ANALYTICS] Computing format performance scores..."
          node social-distributor/analytics/performance-scorer.js --update 2>&1 || {
            echo "[ANALYTICS] WARN: Performance scorer failed (non-fatal)"
          }

      - name: Diagnostic — analytics data snapshot before commit
        run: |
          echo "===== git status (short) ====="
          git status --short || true
          echo "===== content-history.json head (500 bytes) ====="
          if [ -f social-distributor/reels/data/content-history.json ]; then
            head -c 500 social-distributor/reels/data/content-history.json
            echo
          else
            echo "(missing)"
          fi
          echo "===== performance-weights.json head (500 bytes) ====="
          if [ -f social-distributor/reels/data/performance-weights.json ]; then
            head -c 500 social-distributor/reels/data/performance-weights.json
            echo
          else
            echo "(missing)"
          fi
          echo "===== trend-priorities.json head (500 bytes) ====="
          if [ -f social-distributor/reels/data/trend-priorities.json ]; then
            head -c 500 social-distributor/reels/data/trend-priorities.json
            echo
          else
            echo "(missing)"
          fi

      - name: Commit updated data files
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          STATE_FILES=(
            "social-distributor/reels/data/trend-priorities.json"
            "social-distributor/reels/data/performance-weights.json"
            "social-distributor/reels/data/content-history.json"
          )

          # Stage state files (individually so missing ones don't abort)
          for f in "${STATE_FILES[@]}"; do
            if [ -f "$f" ]; then
              git add "$f" || true
            fi
          done
          # Reports directory is optional — stage if present
          if [ -d social-distributor/analytics/reports ]; then
            git add social-distributor/analytics/reports/ || true
          fi

          if git diff --cached --quiet; then
            echo "[ANALYTICS] No data file changes to commit."
            echo "[ANALYTICS] Done. Scheduler will use fresh data at next reel trigger."
            exit 0
          fi

          git commit -m "chore: daily analytics update [$(date -u +%Y-%m-%d)]"

          MAX_ATTEMPTS=3
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "[ANALYTICS] Push attempt $ATTEMPT/$MAX_ATTEMPTS"

            if git push origin HEAD:main; then
              echo "[ANALYTICS] Push succeeded on attempt $ATTEMPT"
              echo "[ANALYTICS] Done. Scheduler will use fresh data at next reel trigger."
              exit 0
            fi

            echo "[ANALYTICS] Push failed — main likely moved. Rebasing onto fresh origin/main."
            git fetch origin main

            if ! git rebase -X ours origin/main; then
              echo "[ANALYTICS] Rebase hit an unresolvable conflict — aborting and falling back to reset-soft strategy."
              git rebase --abort || true
              git reset --soft origin/main
              for f in "${STATE_FILES[@]}"; do
                if [ -f "$f" ]; then
                  git add "$f" || true
                fi
              done
              if [ -d social-distributor/analytics/reports ]; then
                git add social-distributor/analytics/reports/ || true
              fi
              if git diff --cached --quiet; then
                echo "[ANALYTICS] After reset-soft, nothing to commit — origin/main already has our changes."
                exit 0
              fi
              git commit -m "chore: daily analytics update [$(date -u +%Y-%m-%d)]"
            fi

            sleep 3
          done

          echo "::error::Analytics state persistence failed after $MAX_ATTEMPTS push attempts — trend-priorities / performance-weights / content-history NOT pushed. Scheduler will use stale data next run."
          exit 1
