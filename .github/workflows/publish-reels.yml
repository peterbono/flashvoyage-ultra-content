name: Publier des Reels Instagram

on:
  # 3 publications par jour — FR prime time (Growth Hacker reco: 19h-22h CET)
  # CEST = UTC+2 en avril-octobre → heures UTC = heure Paris - 2
  schedule:
    # 19h00 Paris = 17h00 UTC (prime time start, scroll après dîner)
    - cron: '0 17 * * *'
    # 21h00 Paris = 19h00 UTC (prime time peak mobile)
    - cron: '0 19 * * *'
    # 22h30 Paris = 20h30 UTC (fin de prime time, dernière chance scroll)
    - cron: '30 20 * * *'

  # Manuel pour tester
  workflow_dispatch:
    inputs:
      format:
        description: 'Format du reel'
        required: true
        type: choice
        options:
          - auto
          - poll
          - pick
          - humor
          - humor-tweet
          - budget
          - versus
          - avantapres
          - month
          - cost-vs
          - leaderboard
          - best-time
      article_id:
        description: 'ID WordPress (optionnel, override le choix auto)'
        required: false
        type: string
      test_only:
        description: 'Test seulement (pas de publication IG)'
        required: false
        default: 'false'
        type: boolean
      telegram_only:
        description: 'Telegram only — generate + send to Telegram, NO IG/FB publish'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

concurrency:
  group: reels-publish
  cancel-in-progress: false

env:
  NODE_ENV: production
  # Cross-posting tokens are injected at step level (secrets not available at workflow env level)

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies (ffmpeg + Chrome)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          # Puppeteer bundled Chrome is auto-installed via npm ci
          # Verify
          ffmpeg -version | head -1
          npx puppeteer browsers install chrome 2>/dev/null || true

      - name: Determine format from smart scheduler
        id: format
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FORMAT="${{ github.event.inputs.format }}"
            if [ "$FORMAT" = "auto" ]; then
              # Even manual "auto" uses the smart scheduler
              echo "[SCHEDULER] Manual trigger with auto — delegating to smart scheduler..."
              RESULT=$(node --input-type=module -e "
                import { decideContent } from './social-distributor/reels/smart-scheduler.js';
                const decision = await decideContent();
                console.log(JSON.stringify(decision));
              " 2>/dev/null | tail -1)
              FORMAT=$(echo "$RESULT" | jq -r '.format // "pick"')
              REASON=$(echo "$RESULT" | jq -r '.reason // "auto fallback"')
              ARTICLE_ID=$(echo "$RESULT" | jq -r '.articleId // empty')
              IS_BREAKING=$(echo "$RESULT" | jq -r '.isBreakingNews // false')
              DESTINATION=$(echo "$RESULT" | jq -r '.destination // empty')
              SLUG=$(echo "$RESULT" | jq -r '.slug // empty')
              echo "[SCHEDULER] Smart decision: $FORMAT ($REASON)"
            else
              REASON="manual dispatch"
              ARTICLE_ID="${{ github.event.inputs.article_id }}"
              IS_BREAKING="false"
              DESTINATION=""
              SLUG=""
            fi
            echo "format=$FORMAT" >> $GITHUB_OUTPUT
            echo "reason=$REASON" >> $GITHUB_OUTPUT
            echo "article_id=$ARTICLE_ID" >> $GITHUB_OUTPUT
            echo "is_breaking=$IS_BREAKING" >> $GITHUB_OUTPUT
            echo "destination=$DESTINATION" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            # publish=false if test_only, telegram_only means generate+telegram but no IG/FB
            TELEGRAM_ONLY="${{ github.event.inputs.telegram_only }}"
            if [ "${{ github.event.inputs.test_only }}" = "true" ]; then
              echo "publish=false" >> $GITHUB_OUTPUT
            elif [ "$TELEGRAM_ONLY" = "true" ]; then
              echo "publish=telegram" >> $GITHUB_OUTPUT
            else
              echo "publish=true" >> $GITHUB_OUTPUT
            fi
          else
            # Cron trigger — try smart scheduler, fallback to static calendar
            echo "[SCHEDULER] Cron trigger — running smart scheduler..."
            SCHEDULER_STDERR=$(mktemp)
            RESULT=$(timeout 60 node --input-type=module -e "
              import { decideContent } from './social-distributor/reels/smart-scheduler.js';
              const decision = await decideContent();
              console.log(JSON.stringify(decision));
            " 2>"$SCHEDULER_STDERR" | tail -1) || true
            if [ -s "$SCHEDULER_STDERR" ]; then
              echo "[SCHEDULER] stderr output:"
              cat "$SCHEDULER_STDERR"
            fi
            rm -f "$SCHEDULER_STDERR"

            if [ -z "$RESULT" ] || ! echo "$RESULT" | jq -e '.format' >/dev/null 2>&1; then
              echo "[SCHEDULER] Smart scheduler failed or timed out — using static calendar fallback"
              HOUR=$(date -u +%H)
              DOW=$(date -u +%u)
              case "$HOUR" in
                05) case $DOW in 1|3|5) FORMAT="pick";; 2|6) FORMAT="budget";; 4) FORMAT="pick";; 7) FORMAT="avantapres";; esac;;
                10) case $DOW in 1|3|5|7) FORMAT="versus";; 4|6) FORMAT="pick";; *) FORMAT="pick";; esac;;
                16) if [ $(($(date -u +%d) % 2)) -eq 0 ]; then FORMAT="humor"; else FORMAT="humor-tweet"; fi;;
                *) FORMAT="pick";;
              esac
              REASON="static calendar fallback (scheduler failed)"
              ARTICLE_ID=""
              IS_BREAKING="false"
              DESTINATION=""
              SLUG=""
            else
              FORMAT=$(echo "$RESULT" | jq -r '.format // "pick"')
              REASON=$(echo "$RESULT" | jq -r '.reason // "fallback"')
              ARTICLE_ID=$(echo "$RESULT" | jq -r '.articleId // empty')
              IS_BREAKING=$(echo "$RESULT" | jq -r '.isBreakingNews // false')
              DESTINATION=$(echo "$RESULT" | jq -r '.destination // empty')
              SLUG=$(echo "$RESULT" | jq -r '.slug // empty')
            fi

            echo "[SCHEDULER] Decision: format=$FORMAT"
            echo "[SCHEDULER] Reason: $REASON"
            echo "[SCHEDULER] Article ID: ${ARTICLE_ID:-auto}"
            echo "[SCHEDULER] Destination: ${DESTINATION:-none}"
            echo "[SCHEDULER] Slug: ${SLUG:-none}"
            echo "[SCHEDULER] Breaking news: $IS_BREAKING"

            echo "format=$FORMAT" >> $GITHUB_OUTPUT
            echo "reason=$REASON" >> $GITHUB_OUTPUT
            echo "article_id=$ARTICLE_ID" >> $GITHUB_OUTPUT
            echo "is_breaking=$IS_BREAKING" >> $GITHUB_OUTPUT
            echo "destination=$DESTINATION" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate and publish reel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISABLE_THREADS: ${{ secrets.DISABLE_THREADS }}
          # Pass step outputs via env to avoid bash injection when reason contains quotes
          FORMAT_OUT: ${{ steps.format.outputs.format }}
          PUBLISH_OUT: ${{ steps.format.outputs.publish }}
          ARTICLE_ID_OUT: ${{ steps.format.outputs.article_id }}
          REASON_OUT: ${{ steps.format.outputs.reason }}
        run: |
          FORMAT="$FORMAT_OUT"
          PUBLISH="$PUBLISH_OUT"
          ARTICLE_ID="$ARTICLE_ID_OUT"
          REASON="$REASON_OUT"

          echo "Format: $FORMAT"
          echo "Publish: $PUBLISH"
          echo "Article ID: ${ARTICLE_ID:-auto}"
          echo "Reason: $REASON"

          # Ensure tokens.json exists for the publisher (IG + FB + Threads)
          mkdir -p social-distributor/data
          echo '{"facebook":{"token":"'$FB_PAGE_TOKEN'","expiresAt":"never"},"threads":{"token":"'$THREADS_TOKEN'","expiresAt":"2026-05-23T00:00:00Z"}}' > social-distributor/data/tokens.json

          # Build CLI args
          ARGS="--format $FORMAT"
          if [ -n "$ARTICLE_ID" ]; then
            ARGS="$ARGS --post $ARTICLE_ID"
          fi

          if [ "$PUBLISH" = "true" ]; then
            node social-distributor/reels/index-v2.js $ARGS --publish
          elif [ "$PUBLISH" = "telegram" ]; then
            node social-distributor/reels/index-v2.js $ARGS --telegram-only
          else
            node social-distributor/reels/index-v2.js $ARGS --test
          fi

      - name: Record publication in content history
        if: success() && steps.format.outputs.publish == 'true'
        env:
          REC_FORMAT: ${{ steps.format.outputs.format }}
          REC_ARTICLE_ID: ${{ steps.format.outputs.article_id }}
          REC_DESTINATION: ${{ steps.format.outputs.destination }}
          REC_SLUG: ${{ steps.format.outputs.slug }}
        run: |
          node --input-type=module -e "
            import { recordPublication } from './social-distributor/reels/smart-scheduler.js';
            recordPublication({
              format: process.env.REC_FORMAT,
              articleId: process.env.REC_ARTICLE_ID ? Number(process.env.REC_ARTICLE_ID) : null,
              destination: process.env.REC_DESTINATION || null,
              slug: process.env.REC_SLUG || null,
            });
            console.log('[SCHEDULER] Publication recorded: format=' + process.env.REC_FORMAT + ' dest=' + (process.env.REC_DESTINATION || 'none') + ' slug=' + (process.env.REC_SLUG || 'none'));
          " 2>&1 || { echo "::error::Failed to record publication in content-history.json — dedup will be broken on next run"; exit 1; }


      # Cross-publishing (FB Reel + Threads + IG Story) is now handled inside
      # index-v2.js → crossPublishReel() after the IG Reel is published.
      # See social-distributor/reels/index-v2.js:publishIfRequested.

      - name: Diagnostic — state files snapshot before commit
        if: success() && steps.format.outputs.publish == 'true'
        run: |
          echo "===== git status (short) ====="
          git status --short || true
          echo "===== reel-history.jsonl line count ====="
          if [ -f social-distributor/data/reel-history.jsonl ]; then
            wc -l social-distributor/data/reel-history.jsonl
          else
            echo "(missing)"
          fi
          echo "===== content-history.json head (500 bytes) ====="
          if [ -f social-distributor/reels/data/content-history.json ]; then
            head -c 500 social-distributor/reels/data/content-history.json
            echo
          else
            echo "(missing)"
          fi
          echo "===== pexels-used.json head (500 bytes) ====="
          if [ -f social-distributor/reels/data/pexels-used.json ]; then
            head -c 500 social-distributor/reels/data/pexels-used.json
            echo
          else
            echo "(missing)"
          fi

      - name: Commit state files (reel history, pexels dedup)
        if: success() && steps.format.outputs.publish == 'true'
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          STATE_FILES=(
            "social-distributor/data/reel-history.jsonl"
            "social-distributor/reels/data/pexels-used.json"
            "social-distributor/reels/data/content-history.json"
            "social-distributor/reels/data/angles/angle-state.json"
          )

          # Stage whatever exists and has changed
          for f in "${STATE_FILES[@]}"; do
            if [ -f "$f" ]; then
              git add "$f" || true
            fi
          done

          # Nothing to commit? Exit clean.
          if git diff --cached --quiet; then
            echo "[STATE] No state file changes to commit."
            exit 0
          fi

          # Create the local commit once — we'll re-apply on top of origin/main if needed.
          git commit -m "chore: update reel state after publish [$(date -u +%Y-%m-%d)]"

          MAX_ATTEMPTS=3
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "[STATE] Push attempt $ATTEMPT/$MAX_ATTEMPTS"

            if git push origin HEAD:main; then
              echo "[STATE] Push succeeded on attempt $ATTEMPT"
              exit 0
            fi

            echo "[STATE] Push failed — main likely moved. Rebasing onto fresh origin/main."
            git fetch origin main

            # Stash-free rebase: our commit only touches JSON state files,
            # conflicts are possible only if another job committed the same files.
            # For JSON-only state, "ours" is the safe resolution — our state reflects
            # the publish that just happened; we don't want to lose it.
            if ! git rebase -X ours origin/main; then
              echo "[STATE] Rebase hit an unresolvable conflict — aborting rebase and falling back to reset-soft strategy."
              git rebase --abort || true

              # Fallback: move HEAD to origin/main while keeping our state files staged,
              # then re-commit on top of the fresh tip.
              git reset --soft origin/main
              # Re-stage state files (reset --soft keeps them in the index already,
              # but be explicit in case of path edge cases).
              for f in "${STATE_FILES[@]}"; do
                if [ -f "$f" ]; then
                  git add "$f" || true
                fi
              done
              if git diff --cached --quiet; then
                echo "[STATE] After reset-soft, nothing to commit — origin/main already has our changes."
                exit 0
              fi
              git commit -m "chore: update reel state after publish [$(date -u +%Y-%m-%d)]"
            fi

            # Small backoff before next push attempt
            sleep 3
          done

          echo "::error::State persistence failed after $MAX_ATTEMPTS push attempts — reel-history.jsonl / content-history.json NOT pushed. Dedup will be stale next run."
          exit 1
