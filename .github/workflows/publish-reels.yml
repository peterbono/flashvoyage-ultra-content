name: Publier des Reels Instagram

on:
  # 3 publications par jour (heures UTC = Paris - 2h en ete)
  schedule:
    # 7h00 Paris = 5h00 UTC (Trip Pick, Budget Jour, Avant/Apres)
    - cron: '0 5 * * *'
    # 12h30 Paris = 10h30 UTC (Versus, Trip Pick)
    - cron: '30 10 * * *'
    # 18h00 Paris = 16h00 UTC (Humor)
    - cron: '0 16 * * *'

  # Manuel pour tester
  workflow_dispatch:
    inputs:
      format:
        description: 'Format du reel'
        required: true
        type: choice
        options:
          - auto
          - poll
          - pick
          - humor
          - humor-tweet
          - budget
          - versus
          - avantapres
          - month
      test_only:
        description: 'Test seulement (pas de publication IG)'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_ENV: production
  # Cross-posting tokens are injected at step level (secrets not available at workflow env level)

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies (ffmpeg + Chrome)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          # Puppeteer bundled Chrome is auto-installed via npm ci
          # Verify
          ffmpeg -version | head -1
          npx puppeteer browsers install chrome 2>/dev/null || true

      - name: Determine format from schedule
        id: format
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "format=${{ github.event.inputs.format }}" >> $GITHUB_OUTPUT
            echo "publish=${{ github.event.inputs.test_only == 'true' && 'false' || 'true' }}" >> $GITHUB_OUTPUT
          else
            # Determine format based on cron time + day of week
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)  # 1=Monday, 7=Sunday

            if [ "$HOUR" = "05" ]; then
              # 7h00 Paris slot
              case $DOW in
                1|3|5) FORMAT="pick" ;;     # Mon, Wed, Fri: Trip Pick
                2|6)   FORMAT="budget" ;;   # Tue, Sat: Budget Jour
                4)     FORMAT="pick" ;;     # Thu: Trip Pick
                7)     FORMAT="avantapres" ;; # Sun: Avant/Apres
              esac
            elif [ "$HOUR" = "10" ]; then
              # 12h30 Paris slot
              case $DOW in
                1|3|5|7) FORMAT="versus" ;; # Mon, Wed, Fri, Sun: Versus
                2)       FORMAT="month" ;;  # Tue: Ou Partir En (1st Tue of month only)
                4|6)     FORMAT="pick" ;;   # Thu, Sat: Trip Pick
              esac
              # Ou Partir En only on first Tuesday of month
              if [ "$FORMAT" = "month" ] && [ "$(date -u +%d)" -gt "7" ]; then
                FORMAT="pick"
              fi
            elif [ "$HOUR" = "16" ]; then
              # 18h00 Paris slot — always Humor
              # Alternate A/B: even days = humor, odd days = humor-tweet
              DAY=$(date -u +%d)
              if [ $((DAY % 2)) -eq 0 ]; then
                FORMAT="humor"
              else
                FORMAT="humor-tweet"
              fi
            fi

            echo "format=${FORMAT:-pick}" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate and publish reel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: |
          FORMAT="${{ steps.format.outputs.format }}"
          PUBLISH="${{ steps.format.outputs.publish }}"

          echo "Format: $FORMAT"
          echo "Publish: $PUBLISH"

          # Ensure tokens.json exists for the publisher (IG + FB + Threads)
          mkdir -p social-distributor/data
          echo '{"facebook":{"token":"'$FB_PAGE_TOKEN'","expiresAt":"never"},"threads":{"token":"'$THREADS_TOKEN'","expiresAt":"2026-05-23T00:00:00Z"}}' > social-distributor/data/tokens.json

          if [ "$FORMAT" = "auto" ]; then
            FORMAT="pick"  # Default for manual "auto"
          fi

          if [ "$PUBLISH" = "true" ]; then
            node social-distributor/reels/index-v2.js --format "$FORMAT" --publish
          else
            node social-distributor/reels/index-v2.js --format "$FORMAT" --test
          fi

      # Cross-publishing: Story + FB Reel + Threads
      # The reel pipeline (index-v2.js) calls cross-publisher.js internally after
      # a successful IG publish. This step is a fallback / explicit trigger.
      - name: Cross-publish to Story + FB Reel + Threads
        if: success() && steps.format.outputs.publish == 'true'
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: |
          echo "Cross-publishing handled by the reel pipeline (cross-publisher.js called after IG publish)"
          echo "Tokens available: FB_PAGE_TOKEN=${FB_PAGE_TOKEN:+set}, THREADS_TOKEN=${THREADS_TOKEN:+set}"
          # If cross-publisher.js is not yet integrated into the pipeline,
          # uncomment the line below to run it standalone:
          # node social-distributor/reels/cross-publisher.js --last

      - name: Commit state files (reel history, pexels dedup)
        if: success() && steps.format.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social-distributor/data/reel-history.jsonl social-distributor/reels/data/pexels-used.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update reel state after publish [$(date -u +%Y-%m-%d)]"
          git push || true
