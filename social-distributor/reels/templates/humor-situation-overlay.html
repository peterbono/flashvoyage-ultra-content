<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* ── Bottom gradient: clear top (photo visible), dark bottom for readability ── */
  .gradient-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60%;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.15) 10%,
      rgba(0, 0, 0, 0.50) 35%,
      rgba(0, 0, 0, 0.85) 100%
    );
    z-index: 1;
  }

  /* ── Safe zone: 200px top, 280px bottom → usable: 200–1640px (1440px) ── */
  /* Content block: vertically centered in safe zone via flexbox             */
  .content-zone {
    position: absolute;
    top: 200px;
    left: 0;
    width: 100%;
    height: 1440px; /* 1920 - 200 - 280 */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 70px;
    z-index: 3;
    overflow: hidden; /* hard clip — nothing escapes safe zone */
  }

  /* ── Setup text: white, normal meme style ── */
  .setup-text {
    font-size: {{SETUP_FONT_SIZE}}px;
    font-weight: 900;
    color: #FFFFFF;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.12;
    max-width: 940px;
    max-height: 500px;
    text-shadow:
      3px 3px 0 #000,
      -1px -1px 0 #000,
      1px -1px 0 #000,
      -1px 1px 0 #000,
      0 4px 15px rgba(0, 0, 0, 0.9);
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
    margin-bottom: 40px;
  }

  /* ── Dots separator ── */
  .separator {
    font-size: 48px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 12px;
    margin-bottom: 40px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
  }

  /* ── Punchline text: yellow #FFD700, bold, bigger impact ── */
  .punchline-text {
    font-size: {{PUNCHLINE_FONT_SIZE}}px;
    font-weight: 900;
    color: #FFD700;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.15;
    max-width: 940px;
    max-height: 400px;
    text-shadow:
      3px 3px 0 rgba(0, 0, 0, 0.8),
      -1px -1px 0 rgba(0, 0, 0, 0.5),
      0 0 30px rgba(255, 215, 0, 0.3),
      0 4px 15px rgba(0, 0, 0, 0.9);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
    margin-bottom: 30px;
  }

  /* ── Reaction emoji ── */
  .reaction-emoji {
    font-size: 120px;
    line-height: 1;
    filter: drop-shadow(0 6px 24px rgba(0, 0, 0, 0.6));
    margin-bottom: 20px;
  }

  /* ── Footer CTA: "TAG UN POTE" — inside safe zone ── */
  .footer-cta {
    font-size: 28px;
    font-weight: 700;
    color: rgba(255, 215, 0, 0.8);
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
  }
</style>
</head>
<body>
<div class="container">
  <div class="gradient-overlay"></div>
  <div class="content-zone">
    <div class="setup-text">{{SETUP_TEXT}}</div>
    <div class="separator">...</div>
    <div class="punchline-text">{{PUNCHLINE_TEXT}}</div>
    <div class="reaction-emoji">{{REACTION_EMOJI}}</div>
    <div class="footer-cta">TAG UN POTE</div>
  </div>
</div>
</body>
</html>
