<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    background: transparent;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .vignette {
    position: absolute;
    top: 0; left: 0;
    width: 1080px; height: 1920px;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.55) 15%, rgba(0,0,0,0.55) 85%, rgba(0,0,0,0.88) 100%);
    z-index: 2;
  }

  /* ── Title ── */
  .title-zone {
    position: absolute;
    top: 320px;
    left: 50%;
    transform: translateX(-50%);
    width: 1000px;
    text-align: center;
    z-index: 10;
  }

  .title-text {
    font-size: 60px;
    font-weight: 900;
    color: #FFFFFF;
    text-transform: uppercase;
    line-height: 1.1;
    letter-spacing: 1px;
    text-shadow:
      0 4px 16px rgba(0, 0, 0, 0.95),
      0 0 30px rgba(0, 0, 0, 0.7);
  }

  /* ── Calendar grid ── */
  /* Layout: 1080 canvas − 40 left margin − 40 right margin = 1000 content width
     - label col (country flag + name): 220px
     - 12 month columns: (1000 − 220) / 12 = 65px each
  */
  .calendar {
    position: absolute;
    top: 500px;
    left: 40px;
    width: 1000px;
    z-index: 10;
    background: rgba(0, 0, 0, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 22px 18px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }

  .month-header-row {
    display: grid;
    grid-template-columns: 210px repeat(12, 1fr);
    gap: 3px;
    padding-bottom: 12px;
    margin-bottom: 14px;
    border-bottom: 2px solid rgba(255, 255, 255, 0.25);
  }

  .month-header-spacer {
    /* empty — just reserves the country label column */
  }

  .month-header-cell {
    text-align: center;
    font-size: 26px;
    font-weight: 900;
    color: rgba(255, 255, 255, 0.82);
    line-height: 1;
  }

  /* Country row */
  .country-row {
    display: grid;
    grid-template-columns: 210px repeat(12, 1fr);
    gap: 3px;
    margin-bottom: 12px;
    align-items: center;
  }

  .country-row:last-child {
    margin-bottom: 0;
  }

  .country-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 12px;
    min-height: 72px;
  }

  .country-label .flag {
    font-size: 46px;
    line-height: 1;
    flex-shrink: 0;
  }

  .country-label .name {
    font-size: 26px;
    font-weight: 900;
    color: #FFFFFF;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.05;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Month cells — color-coded per status */
  .month-cell {
    height: 72px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
  }

  .month-cell.ok {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .month-cell.best {
    background: #FFD700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.35);
  }

  /* Sweet spot = shoulder season "bon plan" (distinct green so it reads
     pre-attentively against the yellow best cells). Growth-hacker spec. */
  .month-cell.sweet {
    background: #7FD1AE;
    box-shadow: 0 0 14px rgba(127, 209, 174, 0.55);
  }

  .month-cell.avoid {
    background: #FF3B30;
    box-shadow: 0 0 10px rgba(255, 59, 48, 0.45);
  }

  .month-cell.avoid::before {
    content: '✕';
    font-size: 24px;
    font-weight: 900;
    color: #FFFFFF;
  }

  /* Connect adjacent same-color cells visually for the "activity bar" feel:
     left/right border radius collapse between consecutive same-status cells.
     Achieved via inline helper classes added by the JS composer if we ever
     want finer control. For MVP, the 3px gap + rounded corners give enough
     visual continuity. */

  /* ── Legend ── */
  .legend {
    position: absolute;
    top: 1520px;
    left: 50%;
    transform: translateX(-50%);
    width: 1000px;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 40px;
    font-size: 24px;
    font-weight: 800;
    color: #FFFFFF;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0, 0, 0, 0.72);
    padding: 12px 20px;
    border-radius: 14px;
  }

  .legend-dot {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .legend-dot.best { background: #FFD700; }
  .legend-dot.sweet { background: #7FD1AE; }
  .legend-dot.avoid { background: #FF3B30; }

  /* ── CTA ── */
  .cta-zone {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }

  .cta-text {
    display: inline-block;
    font-size: 38px;
    font-weight: 900;
    color: #0a0e1a;
    background: #FFD700;
    padding: 22px 44px;
    border-radius: 22px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    box-shadow: 0 8px 26px rgba(255, 215, 0, 0.55);
  }
</style>
</head>
