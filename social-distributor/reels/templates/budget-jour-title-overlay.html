<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* ── Vignette: edges dark, center clear for footage ── */
  .vignette-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      ellipse at center,
      rgba(0, 0, 0, 0) 30%,
      rgba(0, 0, 0, 0.55) 100%
    );
    z-index: 1;
  }

  /* ── Bottom gradient: bottom 50% → dark for text readability ── */
  .bottom-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.20) 15%,
      rgba(0, 0, 0, 0.55) 40%,
      rgba(0, 0, 0, 0.85) 100%
    );
    z-index: 2;
  }

  /* ── Content zone: badge + destination + duration + accent ── */
  .content-zone {
    position: absolute;
    top: 700px;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 3;
    text-align: center;
  }

  /* ── Badge: BUDGET VOYAGE ── */
  .budget-badge {
    display: inline-block;
    background: #FFD700;
    color: #000;
    font-family: 'Montserrat', sans-serif;
    font-size: 30px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    padding: 12px 36px;
    border-radius: 30px;
    box-shadow: 0 4px 16px rgba(255, 215, 0, 0.35);
  }

  /* ── Destination name ── */
  .destination {
    font-family: 'Montserrat', sans-serif;
    font-size: 100px;
    font-weight: 900;
    color: #FFFFFF;
    text-transform: uppercase;
    line-height: 1.05;
    margin-top: 30px;
    max-width: 960px;
    word-break: break-word;
    text-shadow:
      0 4px 20px rgba(0, 0, 0, 0.9),
      0 0 40px rgba(0, 0, 0, 0.5);
  }

  /* ── Duration label ── */
  .duration {
    font-family: 'Montserrat', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.80);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 15px;
    text-shadow:
      0 3px 12px rgba(0, 0, 0, 0.8),
      0 0 20px rgba(0, 0, 0, 0.4);
  }

  /* ── Gold accent line ── */
  .gold-accent-line {
    width: 150px;
    height: 5px;
    background: #FFD700;
    border-radius: 3px;
    margin-top: 20px;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
  }
</style>
</head>
<body>
<div class="container">
  <div class="vignette-overlay"></div>
  <div class="bottom-gradient"></div>
  <div class="content-zone">
    <div class="budget-badge">BUDGET VOYAGE</div>
    <div class="destination">{{DESTINATION}}</div>
    <div class="duration">{{DURATION_LABEL}}</div>
    <div class="gold-accent-line"></div>
  </div>
</div>
</body>
</html>
