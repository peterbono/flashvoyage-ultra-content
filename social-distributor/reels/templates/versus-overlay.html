<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* ── Center divider line ── */
  .divider-line {
    position: absolute;
    top: 0;
    left: 538px;
    width: 4px;
    height: 1920px;
    background: rgba(255, 255, 255, 0.85);
    z-index: 5;
    box-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
  }

  /* ── VS Title zone (top, centered) ── */
  /* Width widened to 1040px (was 1020) + dest names sized dynamically from
     JS via {{TITLE_FONT_SIZE}} etc. to avoid truncation on long country
     names (e.g. "Nouvelle-Zélande" = 16 chars). flex: 0 1 auto lets each
     side shrink to its natural width instead of forcing 50/50. */
  .vs-title-zone {
    position: absolute;
    top: 320px;
    left: 50%;
    transform: translateX(-50%);
    width: 1040px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 10;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 24px;
    padding: 28px 20px;
  }

  .dest-name {
    font-family: 'Montserrat', sans-serif;
    font-size: {{TITLE_FONT_SIZE}}px;
    font-weight: 900;
    color: #FFFFFF;
    text-transform: uppercase;
    line-height: 1.05;
    text-shadow:
      0 4px 16px rgba(0, 0, 0, 0.9),
      0 2px 4px rgba(0, 0, 0, 0.5);
    white-space: nowrap;
  }

  .dest-left {
    text-align: right;
    flex: 0 1 auto;
    padding-right: 8px;
  }

  .dest-right {
    text-align: left;
    flex: 0 1 auto;
    padding-left: 8px;
  }

  .flag {
    font-size: {{FLAG_FONT_SIZE}}px;
    vertical-align: middle;
    margin: 0 4px;
  }

  .vs-label {
    font-family: 'Montserrat', sans-serif;
    font-size: {{VS_FONT_SIZE}}px;
    font-weight: 900;
    font-style: italic;
    color: #FFD700;
    text-shadow:
      0 4px 20px rgba(255, 215, 0, 0.6),
      0 0 40px rgba(255, 215, 0, 0.3);
    flex-shrink: 0;
    padding: 0 14px;
  }

  /* ── Comparison rows ── */
  .rows-container {
    position: absolute;
    top: 500px;
    left: 0;
    width: 1080px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  .comparison-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .row-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 34px;
    font-weight: 900;
    color: #FFD700;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow:
      0 2px 10px rgba(0, 0, 0, 0.9),
      0 0 20px rgba(0, 0, 0, 0.6);
    text-align: center;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 6px 28px;
    border-radius: 12px;
    display: inline-block;
  }

  .row-pills {
    display: flex;
    width: 100%;
    justify-content: center;
    gap: 50px;
    padding: 0 70px;
  }

  .pill {
    background: rgba(255, 215, 0, 0.92);
    border-radius: 20px;
    padding: 16px 20px;
    width: 420px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 4px 16px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }

  .pill-left {
    text-align: center;
  }

  .pill-right {
    text-align: center;
  }

  .pill-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: #1a1a1a;
    line-height: 1.25;
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Winner accent (optional per-pill) ── */
  .pill.winner {
    background: rgba(255, 215, 0, 1);
    box-shadow:
      0 4px 20px rgba(255, 215, 0, 0.5),
      0 6px 24px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }

  .pill.winner .pill-text {
    color: #000000;
  }

  /* ── Alternate pill style: dark pill for variety ── */
  .pill.dark {
    background: rgba(0, 0, 0, 0.80);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .pill.dark .pill-text {
    color: #FFFFFF;
  }

  /* ── CTA (bottom) ── */
  .cta-zone {
    position: absolute;
    top: 1540px;
    left: 0;
    width: 1080px;
    text-align: center;
    z-index: 10;
  }

  .cta-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: none;
    background: #FFD700;
    display: inline-block;
    padding: 20px 48px;
    border-radius: 24px;
    box-shadow:
      0 6px 24px rgba(0, 0, 0, 0.5),
      0 0 40px rgba(255, 215, 0, 0.3);
  }
</style>
</head>
<body>
<div class="container">
  <!-- Center divider -->
  <div class="divider-line"></div>

  <!-- VS Title -->
  <div class="vs-title-zone">
    <div class="dest-name dest-left">{{DEST_A}} <span class="flag">{{FLAG_A}}</span></div>
    <span class="vs-label">Vs.</span>
    <div class="dest-name dest-right"><span class="flag">{{FLAG_B}}</span> {{DEST_B}}</div>
  </div>

  <!-- Comparison rows -->
  <div class="rows-container">
    <!-- Row 1 -->
    <div class="comparison-row" style="{{ROW_1_STYLE}}">
      <div class="row-label">{{ROW_1_LABEL}}</div>
      <div class="row-pills">
        <div class="pill pill-left"><span class="pill-text">{{ROW_1_LEFT}}</span></div>
        <div class="pill pill-right"><span class="pill-text">{{ROW_1_RIGHT}}</span></div>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="comparison-row" style="{{ROW_2_STYLE}}">
      <div class="row-label">{{ROW_2_LABEL}}</div>
      <div class="row-pills">
        <div class="pill pill-left"><span class="pill-text">{{ROW_2_LEFT}}</span></div>
        <div class="pill pill-right"><span class="pill-text">{{ROW_2_RIGHT}}</span></div>
      </div>
    </div>

    <!-- Row 3 -->
    <div class="comparison-row" style="{{ROW_3_STYLE}}">
      <div class="row-label">{{ROW_3_LABEL}}</div>
      <div class="row-pills">
        <div class="pill pill-left"><span class="pill-text">{{ROW_3_LEFT}}</span></div>
        <div class="pill pill-right"><span class="pill-text">{{ROW_3_RIGHT}}</span></div>
      </div>
    </div>

    <!-- Row 4 -->
    <div class="comparison-row" style="{{ROW_4_STYLE}}">
      <div class="row-label">{{ROW_4_LABEL}}</div>
      <div class="row-pills">
        <div class="pill pill-left"><span class="pill-text">{{ROW_4_LEFT}}</span></div>
        <div class="pill pill-right"><span class="pill-text">{{ROW_4_RIGHT}}</span></div>
      </div>
    </div>

    <!-- Row 5 -->
    <div class="comparison-row" style="{{ROW_5_STYLE}}">
      <div class="row-label">{{ROW_5_LABEL}}</div>
      <div class="row-pills">
        <div class="pill pill-left"><span class="pill-text">{{ROW_5_LEFT}}</span></div>
        <div class="pill pill-right"><span class="pill-text">{{ROW_5_RIGHT}}</span></div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-zone">
    <span class="cta-text">{{CTA_TEXT}}</span>
  </div>
</div>
</body>
</html>
