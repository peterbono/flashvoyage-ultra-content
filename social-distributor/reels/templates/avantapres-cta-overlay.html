<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* ── Full dark overlay ── */
  .dark-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.80);
    z-index: 1;
  }

  /* ── Centered content ── */
  .content-zone {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 80px;
    text-align: center;
    z-index: 2;
  }

  .cta-text {
    font-size: 52px;
    font-weight: 900;
    color: #FFFFFF;
    text-transform: uppercase;
    line-height: 1.2;
    letter-spacing: 1px;
    text-shadow:
      2px 2px 0 rgba(0, 0, 0, 0.5),
      0 3px 8px rgba(0, 0, 0, 0.6);
    margin-bottom: 25px;
    max-width: 900px;
  }

  .gold-underline {
    width: 200px;
    height: 5px;
    background: #FFD700;
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    margin-bottom: 25px;
  }

  .cta-sub {
    font-size: 32px;
    font-weight: 700;
    color: #FFD700;
    letter-spacing: 1px;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
  }
</style>
</head>
<body>
<div class="container">
  <div class="dark-overlay"></div>
  <div class="content-zone">
    <div class="cta-text">ET TOI C'&Eacute;TAIT COMMENT ?</div>
    <div class="gold-underline"></div>
    <div class="cta-sub">Commente ta destination &#x1F447;</div>
  </div>
</div>
</body>
</html>
