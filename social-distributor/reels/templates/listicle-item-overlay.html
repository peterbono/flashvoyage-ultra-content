<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* Bottom 50%: gradient from transparent to dark */
  .gradient-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.25) 20%,
      rgba(0, 0, 0, 0.6) 50%,
      rgba(0, 0, 0, 0.85) 100%
    );
    z-index: 1;
  }

  /* Content zone in bottom half */
  .content-zone {
    position: absolute;
    bottom: 140px;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 80px;
    text-align: center;
    z-index: 2;
  }

  /* Number in yellow */
  .item-number {
    font-size: 120px;
    font-weight: 900;
    color: #FFD700;
    line-height: 1;
    margin-bottom: 20px;
    text-shadow:
      4px 4px 0 rgba(0, 0, 0, 0.6),
      0 0 20px rgba(255, 215, 0, 0.3);
  }

  /* Item text in white */
  .item-text {
    font-size: 56px;
    font-weight: 800;
    color: white;
    text-transform: uppercase;
    line-height: 1.15;
    letter-spacing: -0.5px;
    text-shadow:
      3px 3px 0 #000,
      -1px -1px 0 #000,
      1px -1px 0 #000,
      -1px 1px 0 #000,
      0 4px 10px rgba(0, 0, 0, 0.8);
    max-width: 920px;
    margin-bottom: 16px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  /* Subtitle in white 80% opacity */
  .item-subtitle {
    font-size: 36px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.8);
    line-height: 1.3;
    max-width: 860px;
    text-shadow:
      2px 2px 0 rgba(0, 0, 0, 0.5),
      0 2px 6px rgba(0, 0, 0, 0.6);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  /* Flash Voyage logo watermark bottom-right */
  .brand-watermark {
    position: absolute;
    bottom: 50px;
    right: 50px;
    opacity: 0.45;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-watermark svg {
    width: 70px;
    height: 72px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="gradient-overlay"></div>
  <div class="content-zone">
    <div class="item-number">{{NUMBER}}</div>
    <div class="item-text">{{ITEM_TEXT}}</div>
    <div class="item-subtitle">{{SUBTITLE}}</div>
  </div>
  <div class="brand-watermark">
    {{LOGO_SVG}}
  </div>
</div>
</body>
</html>
