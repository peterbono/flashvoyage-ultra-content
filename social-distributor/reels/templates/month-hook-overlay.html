<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* -- Vignette: edges dark, center clear for footage -- */
  .vignette-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      ellipse at center,
      rgba(0, 0, 0, 0) 30%,
      rgba(0, 0, 0, 0.60) 100%
    );
    z-index: 1;
  }

  /* -- Bottom gradient: bottom 50% -> dark for text readability -- */
  .bottom-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.20) 15%,
      rgba(0, 0, 0, 0.55) 40%,
      rgba(0, 0, 0, 0.85) 100%
    );
    z-index: 2;
  }

  /* -- Center zone: label + month name + accent line + subtitle -- */
  .center-zone {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 60px;
    z-index: 3;
    text-align: center;
  }

  .label {
    font-family: 'Montserrat', sans-serif;
    font-size: 40px;
    font-weight: 800;
    color: #FFFFFF;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 0, 0, 0.5);
    margin-bottom: 15px;
  }

  .month-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 140px;
    font-weight: 900;
    color: #FFD700;
    text-transform: uppercase;
    line-height: 1.05;
    text-shadow:
      0 4px 20px rgba(0, 0, 0, 0.9),
      0 0 40px rgba(255, 215, 0, 0.35),
      0 0 80px rgba(255, 215, 0, 0.15);
    max-width: 960px;
    word-break: break-word;
    margin-bottom: 25px;
  }

  .gold-accent-line {
    width: 180px;
    height: 6px;
    background: #FFD700;
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    margin-bottom: 25px;
  }

  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.80);
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7), 0 0 20px rgba(0, 0, 0, 0.4);
  }
</style>
</head>
<body>
<div class="container">
  <div class="vignette-overlay"></div>
  <div class="bottom-gradient"></div>
  <div class="center-zone">
    <div class="label">O&#xD9; PARTIR EN</div>
    <div class="month-name">{{MONTH_NAME}}</div>
    <div class="gold-accent-line"></div>
    <div class="subtitle">5 DESTINATIONS EN ASIE</div>
  </div>
</div>
</body>
</html>
