<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* ── Vignette: edges dark, center clear for footage ── */
  .vignette-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      ellipse at center,
      rgba(0, 0, 0, 0) 30%,
      rgba(0, 0, 0, 0.60) 100%
    );
    z-index: 1;
  }

  /* ── Bottom gradient: bottom 50% → dark for text readability ── */
  .bottom-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.20) 15%,
      rgba(0, 0, 0, 0.55) 40%,
      rgba(0, 0, 0, 0.85) 100%
    );
    z-index: 2;
  }

  /* ── Series badge: top-left ── */
  .series-badge {
    position: absolute;
    top: 320px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 3;
  }
  .series-badge-dot {
    width: 8px;
    height: 8px;
    background: #FFD700;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .series-badge-text {
    font-size: 32px;
    font-weight: 800;
    color: #FFD700;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7), 0 0 20px rgba(0, 0, 0, 0.5);
  }

  /* ── Center zone: country name + subtitle + accent line ── */
  .center-zone {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 60px;
    z-index: 3;
    text-align: center;
  }

  .country-name {
    font-family: 'Playfair Display', 'Georgia', serif;
    font-size: 130px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.05;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.5);
    max-width: 960px;
    word-break: break-word;
    margin-bottom: 25px;
  }

  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-size: 44px;
    font-weight: 800;
    color: #FFD700;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 3px 12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 0, 0, 0.4);
    margin-bottom: 20px;
  }

  .gold-accent-line {
    width: 180px;
    height: 6px;
    background: #FFD700;
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
  }
</style>
</head>
<body>
<div class="container">
  <div class="vignette-overlay"></div>
  <div class="bottom-gradient"></div>
  <div class="series-badge">
    <div class="series-badge-dot"></div>
    <div class="series-badge-text">FLASH PICK</div>
  </div>
  <div class="center-zone">
    <div class="country-name">{{COUNTRY_NAME}}</div>
    <div class="subtitle">{{COUNT}} SPOTS À NE PAS RATER</div>
    <div class="gold-accent-line"></div>
  </div>
</div>
</body>
</html>
