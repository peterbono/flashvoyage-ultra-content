<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* ── Bottom gradient: bottom 40% dark for text readability ── */
  .bottom-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0.20) 15%,
      rgba(0, 0, 0, 0.55) 40%,
      rgba(0, 0, 0, 0.80) 100%
    );
    z-index: 2;
  }

  /* ── Top badge: APRES pill (red) ── */
  .badge-zone {
    position: absolute;
    top: 320px;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 3;
  }
  .badge-pill {
    display: inline-block;
    font-size: 44px;
    font-weight: 900;
    color: #FFFFFF;
    background: #FF4444;
    border-radius: 28px;
    padding: 16px 48px;
    letter-spacing: 4px;
    text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(255, 68, 68, 0.4);
  }

  /* ── Destination name ── */
  .destination {
    margin-top: 20px;
    font-size: 80px;
    font-weight: 900;
    color: #FFFFFF;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: 3px;
    text-shadow:
      3px 3px 0 rgba(0, 0, 0, 0.8),
      0 4px 20px rgba(0, 0, 0, 0.9);
    max-width: 940px;
    word-break: break-word;
  }

  /* ── Main text: "CE QUE TU VIS VRAIMENT" in gold ── */
  .main-text-zone {
    position: absolute;
    bottom: 380px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 0 60px;
    z-index: 3;
  }
  .main-text {
    font-size: 64px;
    font-weight: 900;
    color: #FFD700;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.15;
    text-shadow:
      2px 2px 0 rgba(0, 0, 0, 0.5),
      0 3px 12px rgba(0, 0, 0, 0.7);
    max-width: 960px;
  }

  /* ── Optional subtitle ── */
  .subtitle-zone {
    position: absolute;
    bottom: 310px;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 0 80px;
    z-index: 3;
  }
  .subtitle {
    font-size: 38px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.8);
    letter-spacing: 1px;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
  }
</style>
</head>
<body>
<div class="container">
  <div class="bottom-gradient"></div>
  <div class="badge-zone">
    <div class="badge-pill">APR&Egrave;S</div>
    <div class="destination">{{DESTINATION}}</div>
  </div>
  <div class="main-text-zone">
    <div class="main-text">CE QUE TU VIS VRAIMENT</div>
  </div>
  <div class="subtitle-zone">
    <div class="subtitle">{{REALITY_TEXT}}</div>
  </div>
</div>
</body>
</html>
