<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }
  .container {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* ── Vintage tint overlay ── */
  .vintage-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(44, 24, 16, 0.20) 0%,
      rgba(44, 24, 16, 0.10) 50%,
      rgba(44, 24, 16, 0.30) 100%
    );
    z-index: 1;
  }

  /* ── Soft vignette for vintage feel ── */
  .vignette {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
      ellipse at center,
      rgba(0, 0, 0, 0) 40%,
      rgba(0, 0, 0, 0.45) 100%
    );
    z-index: 2;
  }

  /* ── Postcard frame ── */
  /* Centered, slightly rotated, cream/paper colored */
  .postcard-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-3deg);
    z-index: 3;
  }

  .postcard {
    width: 900px;
    height: 600px;
    background: #FFF8E7;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  /* Postcard texture: subtle paper grain */
  .postcard::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 29px,
        rgba(0, 0, 0, 0.03) 29px,
        rgba(0, 0, 0, 0.03) 30px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ── Postcard: destination title (cursive) ── */
  .diary-destination {
    font-family: 'Dancing Script', cursive;
    font-size: 56px;
    font-weight: 700;
    color: #2C1810;
    line-height: 1.3;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
  }

  /* ── Postcard: body text (serif) ── */
  .diary-body {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 400;
    color: #5C3D2E;
    line-height: 1.5;
    letter-spacing: 0.3px;
    position: relative;
    z-index: 1;
    max-height: 200px;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  /* ── Postcard: date/location in corner ── */
  .diary-meta {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    font-style: italic;
    color: #5C3D2E;
    text-align: right;
    position: relative;
    z-index: 1;
  }

  /* ── Stamp: red circular "stamp" overlay ── */
  .stamp {
    position: absolute;
    top: -20px;
    right: -15px;
    width: 120px;
    height: 120px;
    border: 4px solid #C41E3A;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(15deg);
    opacity: 0.7;
    z-index: 4;
  }
  .stamp-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: #C41E3A;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  /* ── Top section: editorial title ABOVE postcard ── */
  .top-editorial {
    position: absolute;
    top: 320px;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 80px;
    z-index: 5;
  }

  .editorial-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: #FFD700;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 12px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
  }

  .editorial-title {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.2;
    text-shadow:
      2px 2px 0 rgba(0, 0, 0, 0.6),
      0 4px 12px rgba(0, 0, 0, 0.7);
    max-width: 920px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  /* ── Bottom section: cursive quote below postcard ── */
  .bottom-quote {
    position: absolute;
    bottom: 340px;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 100px;
    z-index: 5;
  }

  .diary-quote {
    font-family: 'Dancing Script', cursive;
    font-size: 44px;
    font-weight: 600;
    color: #FFFFFF;
    line-height: 1.4;
    text-shadow:
      2px 2px 0 rgba(0, 0, 0, 0.6),
      0 4px 12px rgba(0, 0, 0, 0.7);
    max-width: 880px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  /* Gold decorative line */
  .gold-line {
    width: 80px;
    height: 3px;
    background: linear-gradient(
      to right,
      rgba(255, 215, 0, 0),
      rgba(255, 215, 0, 0.8),
      rgba(255, 215, 0, 0)
    );
    margin-top: 16px;
  }

  /* ── NO logo/watermark on diary format (vintage aesthetic) ── */
</style>
</head>
<body>
<div class="container">
  <div class="vintage-overlay"></div>
  <div class="vignette"></div>
  <div class="top-editorial">
    <div class="editorial-label">{{EDITORIAL_LABEL}}</div>
    <div class="editorial-title">{{EDITORIAL_TITLE}}</div>
  </div>
  <div class="postcard-container">
    <div class="postcard">
      <div class="diary-destination">{{DIARY_DESTINATION}}</div>
      <div class="diary-body">{{DIARY_BODY}}</div>
      <div class="diary-meta">{{DIARY_META}}</div>
      <div class="stamp">
        <div class="stamp-text">{{STAMP_TEXT}}</div>
      </div>
    </div>
  </div>
  <div class="bottom-quote">
    <div class="diary-quote">{{DIARY_QUOTE}}</div>
    <div class="gold-line"></div>
  </div>
</div>
</body>
</html>
