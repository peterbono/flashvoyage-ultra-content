<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Inter', Arial, sans-serif;
    background: #000000;
  }

  .container {
    position: relative;
    width: 1080px;
    height: 1350px;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Large logo icon (white version) — 240px */
  .logo-large {
    width: 240px;
    height: 240px;
    margin-bottom: 40px;
  }

  .logo-large svg {
    width: 240px;
    height: 240px;
  }

  /* Brand name — YELLOW, Bebas Neue, 64px */
  .brand-name {
    font-family: 'Bebas Neue', Impact, 'Arial Black', sans-serif;
    font-size: 64px;
    color: #FFD700;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* Value proposition — WHITE, Inter, 28px */
  .value-prop {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.80);
    text-align: center;
    max-width: 740px;
    line-height: 1.5;
    margin-bottom: 56px;
    letter-spacing: 0.5px;
  }

  /* CTA button — YELLOW bg, BLACK text, rounded */
  .cta-button {
    background: #FFD700;
    border-radius: 50px;
    padding: 24px 60px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }

  .cta-button .cta-text {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #000000;
    letter-spacing: 0.5px;
  }

  /* Save prompt — white 24px, 60% opacity */
  .save-prompt {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 24px;
    color: rgba(255, 255, 255, 0.60);
    letter-spacing: 0.5px;
  }

  /* Decorative dots */
  .dot-row {
    display: flex;
    gap: 8px;
    margin-bottom: 48px;
  }

  .dot-row .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.30);
  }

  .dot-row .dot.active {
    background: #FFD700;
  }
</style>
</head>

  <div class="container">

    <!-- Decorative dots -->
    <div class="dot-row">
      <div class="dot"></div>
      <div class="dot"></div>

    </div>

    <!-- Brand name -->
    <div class="brand-name">Flash Voyage</div>

    <!-- Value proposition -->
    <div class="value-prop">{{VALUE_PROP}}</div>

    <!-- CTA button -->
    <div class="cta-button">
      <span class="cta-text">{{CTA_TEXT}}</span>
    </div>

    <!-- Save prompt -->
    <div class="save-prompt">{{SAVE_TEXT}}</div>
  </div>
</body>
</html>
