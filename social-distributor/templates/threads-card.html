<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', Arial, sans-serif;
    background: #000;
  }

  .container {
    position: relative;
    width: 1080px;
    height: 1080px;
  }

  /* Background photo — fills entire card */
  .photo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('{{IMAGE_URL}}');
    background-size: cover;
    background-position: center;
  }

  /* Minimal overlay — Threads shows caption text prominently,
     so the image does most of the talking. Just enough to
     make the branding readable. */
  .subtle-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.15) 0%,
      rgba(0, 0, 0, 0) 30%,
      rgba(0, 0, 0, 0) 65%,
      rgba(0, 0, 0, 0.50) 85%,
      rgba(0, 0, 0, 0.75) 100%
    );
  }

  /* Brand watermark — top left, subtle */
  .brand-watermark {
    position: absolute;
    top: 40px;
    left: 44px;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-dot {
    width: 12px;
    height: 12px;
    background: #FFD600;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(255, 214, 0, 0.4);
  }

  .brand-name {
    color: #FFFFFF;
    font-family: 'Bebas Neue', Impact, 'Arial Black', sans-serif;
    font-size: 26px;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    opacity: 0.85;
  }

  /* Bottom bar — minimal location/category hint */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 32px 44px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 3;
  }

  .location-tag {
    color: #FFFFFF;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
    opacity: 0.8;
  }

  .handle {
    color: #FFD600;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="photo"></div>
    <div class="subtle-overlay"></div>
    <div class="brand-watermark">
      <div class="brand-dot"></div>
      <div class="brand-name">Flash Voyage</div>
    </div>
    <div class="bottom-bar">
      <div class="location-tag">{{LOCATION_TAG}}</div>
      <div class="handle">@flashvoyagemedia</div>
    </div>
  </div>
</body>
</html>
