<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Montserrat', sans-serif; }
  .container { position: relative; width: 1080px; height: 1350px; }
  .photo {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('{{IMAGE_URL}}');
    background-size: cover; background-position: center;
  }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.55);
  }
  .content {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 60px 50px; text-align: center; z-index: 2;
  }
  .title {
    font-size: 52px; font-weight: 900; color: #FFFFFF; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 40px; line-height: 1.15;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .rows { width: 100%; max-width: 900px; }
  .row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 30px; margin-bottom: 12px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 16px; backdrop-filter: blur(4px);
  }
  .row-left {
    display: flex; align-items: center; gap: 16px;
  }
  .row-emoji { font-size: 36px; }
  .row-label { font-size: 28px; font-weight: 700; color: #FFFFFF; }
  .row-values {
    display: flex; gap: 40px;
  }
  .row-value {
    font-size: 28px; font-weight: 800; min-width: 120px; text-align: center;
  }
  .value-a { color: #FFD700; }
  .value-b { color: #FFFFFF; }
  .header-row {
    display: flex; justify-content: flex-end; gap: 40px;
    padding: 0 30px 20px; max-width: 900px; width: 100%;
  }
  .header-dest {
    font-size: 36px; font-weight: 900; min-width: 120px; text-align: center;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .dest-a { color: #FFD700; }
  .dest-b { color: #FFFFFF; }
  .verdict {
    margin-top: 30px; padding: 18px 50px;
    background: #FFD700; border-radius: 50px;
    font-size: 28px; font-weight: 900; color: #000;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .brand {
    position: absolute; bottom: 30px; right: 40px;
    font-size: 20px; font-weight: 700; color: #FFD700;
    opacity: 0.7; letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="photo"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="title">{{TITLE}}</div>
    <div class="header-row">
      <div class="header-dest dest-a">{{FLAG_A}} {{DEST_A}}</div>
      <div class="header-dest dest-b">{{FLAG_B}} {{DEST_B}}</div>
    </div>
    <div class="rows">
      <div class="row">
        <div class="row-left"><span class="row-emoji">💰</span><span class="row-label">Budget/jour</span></div>
        <div class="row-values"><span class="row-value value-a">{{BUDGET_A}}</span><span class="row-value value-b">{{BUDGET_B}}</span></div>
      </div>
      <div class="row">
        <div class="row-left"><span class="row-emoji">✈️</span><span class="row-label">Vol A/R</span></div>
        <div class="row-values"><span class="row-value value-a">{{VOL_A}}</span><span class="row-value value-b">{{VOL_B}}</span></div>
      </div>
      <div class="row">
        <div class="row-left"><span class="row-emoji">🛂</span><span class="row-label">Visa</span></div>
        <div class="row-values"><span class="row-value value-a">{{VISA_A}}</span><span class="row-value value-b">{{VISA_B}}</span></div>
      </div>
      <div class="row">
        <div class="row-left"><span class="row-emoji">🏨</span><span class="row-label">Nuit</span></div>
        <div class="row-values"><span class="row-value value-a">{{NUIT_A}}</span><span class="row-value value-b">{{NUIT_B}}</span></div>
      </div>
      <div class="row">
        <div class="row-left"><span class="row-emoji">🍜</span><span class="row-label">Repas</span></div>
        <div class="row-values"><span class="row-value value-a">{{REPAS_A}}</span><span class="row-value value-b">{{REPAS_B}}</span></div>
      </div>
    </div>
    <div class="verdict">{{VERDICT}}</div>
  </div>
  <div class="brand-logo" style="position:absolute;bottom:44px;right:44px;width:70px;height:72px;opacity:0.45;z-index:3"><svg viewBox="0 0 230 234" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M172.995 94.7653C172.175 87.4153 171.095 80.3853 169.515 75.4453C169.235 74.5653 161.415 73.9353 157.635 72.2953C156.005 71.5953 153.925 73.5353 153.145 74.2253L111.475 106.005L143.845 107.535L48.1554 178.125L87.1354 115.265L52.0154 113.785L117.695 68.5653C116.295 66.7853 111.675 64.5553 110.165 63.8553C108.145 62.8953 106.245 64.1953 105.795 64.4653L50.0254 94.0453C45.0554 75.9453 48.8154 59.2253 56.4454 45.1353C62.6254 47.4253 70.0554 60.4453 72.6154 68.5653C75.5554 59.9953 74.0654 53.3553 69.9354 46.5653C78.6654 48.4653 86.0654 52.0653 92.1754 57.7253C94.4854 55.7553 91.8754 46.2653 83.6454 41.6053C79.6854 39.6953 78.2654 38.6153 73.5954 37.3553C78.8454 35.1853 85.8954 33.1053 92.8454 31.9053C89.5054 29.1453 85.6954 26.9953 78.8654 27.1253C73.6654 27.2153 71.5154 28.6153 63.6154 30.5453C68.0954 24.0653 65.2654 11.8153 57.0454 5.95528C50.1054 0.955276 44.7954 0.735275 36.9554 0.855275C45.6554 9.52528 50.0854 20.3653 52.3554 28.7653C44.0054 22.4353 36.4754 20.3853 27.1254 20.2353C19.2654 21.1253 11.7654 22.5253 4.7054 30.4353C2.8354 33.0553 1.3654 35.1953 0.225402 37.3553C8.1454 35.2053 11.9554 33.3553 21.0554 33.4253C29.7854 33.4953 39.9554 35.7553 44.8054 37.8753C22.5954 43.3953 3.2954 61.4953 0.495402 88.8253C-1.0746 98.6053 1.1554 111.455 6.2154 124.555C14.9954 147.555 29.6454 168.165 47.7254 189.745C58.5654 202.005 72.7954 217.575 92.1754 233.705C116.045 210.855 150.175 177.235 167.355 132.205C171.015 122.225 173.355 110.435 172.995 94.7353V94.7653Z" fill="white"/><path d="M228.795 12.1153C226.425 4.02528 216.205 0.0852758 208.675 0.00527581C193.965 -0.154724 183.195 3.29527 155.965 14.3553C154.875 14.8053 154.955 14.8153 153.035 14.0853C139.015 8.54527 125.845 6.03528 108.525 5.98528C97.8054 5.94528 93.8154 8.02527 87.4054 9.32527C102.775 10.2753 119.235 12.9 </div>
</body>
</html>
