<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Bebas Neue', Impact, 'Arial Black', sans-serif;
    background: #262728;
  }

  .container {
    position: relative;
    width: 1080px;
    height: 1080px;
  }

  /* Background photo */
  .photo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('{{IMAGE_URL}}');
    background-size: cover;
    background-position: center;
  }

  /* Heavy dark overlay — darker than story-card for news urgency */
  .dark-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(38, 39, 40, 0.45) 0%,
      rgba(38, 39, 40, 0.75) 50%,
      rgba(38, 39, 40, 0.95) 100%
    );
  }

  /* Content positioned at bottom */
  .content {
    position: absolute;
    bottom: 100px;
    left: 64px;
    right: 64px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* Red badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #F70F28;
    color: #FFFFFF;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 14px 32px;
    border-radius: 4px;
    margin-bottom: 24px;
  }

  .badge-icon {
    font-size: 26px;
    line-height: 1;
  }

  /* Category tag — RED */
  .category {
    color: #F70F28;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* Main headline — WHITE, large mobile-first */
  .headline {
    color: #FFFFFF;
    font-size: 80px;
    font-weight: 700;
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: 3px;
    max-width: 900px;
    margin-bottom: 20px;
    text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.8);
  }

  /* Red accent line */
  .accent-line {
    width: 100px;
    height: 3px;
    background: #F70F28;
    margin-bottom: 16px;
    border-radius: 2px;
  }

  /* Subtext — white at 85% opacity */
  .subtext {
    color: rgba(255, 255, 255, 0.85);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 36px;
    font-weight: 400;
    line-height: 1.3;
    max-width: 800px;
    text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9);
  }

  /* Bottom brand */
  .bottom-block {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 2;
  }

  .separator {
    width: 60px;
    height: 2px;
    background: rgba(255, 255, 255, 0.25);
    border-radius: 2px;
  }

  /* Brand signature — RED */
  .brand {
    color: #F70F28;
    font-family: 'Bebas Neue', Impact, 'Arial Black', sans-serif;
    font-size: 28px;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.90;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="photo"></div>
    <div class="dark-overlay"></div>
    <div class="content">
      <div class="badge">
        <span class="badge-icon">&#9889;</span>
        <span>FLASH INFO</span>
      </div>
      <div class="category">{{CATEGORY}}</div>
      <div class="headline">{{HEADLINE}}</div>
      <div class="accent-line"></div>
      <div class="subtext">{{SUBTEXT}}</div>
    </div>
    <div class="bottom-block">
      <div class="separator"></div>
      <div class="brand">FLASH VOYAGE</div>
    </div>
  </div>
</body>
</html>
